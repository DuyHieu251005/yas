apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-staging-services
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          # 🟢 13 services cốt lõi (theo yêu cầu thầy)
          - service: yas-configuration
          - service: swagger-ui
          - service: cart
          - service: customer
          - service: inventory
          - service: media
          - service: order
          - service: product
          - service: search
          - service: tax
          - service: storefront-bff
          - service: backoffice-bff
          - service: storefront-ui
          - service: backoffice-ui
  template:
    metadata:
      name: "yas-staging-{{service}}"
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/DuyHieu251005/yas.git
        # Staging flow:
        # 1. Developer tạo git tag vX.Y.Z trên main branch
        # 2. Jenkins CI phát hiện tag → build image với tag vX.Y.Z → push DockerHub
        # 3. Thay đổi image.tag ở đây thành vX.Y.Z và manual sync trên ArgoCD UI
        # 4. ArgoCD deploy images vX.Y.Z vào namespace yas-staging
        targetRevision: main
        path: "k8s/charts/{{service}}"
        helm:
          parameters:
            # ⚠️ Cập nhật tag này thành vX.Y.Z khi có release, rồi manual sync
            - name: backend.image.tag
              value: v1.0.1
            - name: ui.image.tag
              value: v1.0.1
            - name: backend.image.pullPolicy
              value: Always
            - name: ui.image.pullPolicy
              value: Always
            - name: backend.service.type
              value: NodePort
            - name: ui.service.type
              value: NodePort
            - name: backend.image.repository
              value: "duyhieu2005/yas-{{service}}"
            - name: ui.image.repository
              value: "duyhieu2005/yas-{{service}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: yas-staging
      syncPolicy:
        # Staging: MANUAL sync only — người quản lý mới được deploy lên staging
        # Không auto-sync để tránh code chưa test lên staging
        syncOptions:
          - CreateNamespace=true
