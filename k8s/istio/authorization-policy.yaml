# ==============================================================
# Authorization Policies - Kiểm soát service-to-service access
#
# NGUYÊN TẮC:
# - Chỉ đặt ALLOW policy trên BACKEND services (product, cart, order...)
# - KHÔNG đặt policy trên frontend (BFF, UI) → Istio allow all by default
# - Service nào có ALLOW policy → CHỈ traffic match mới qua được
# - Dùng principals để xác thực identity (mTLS ServiceAccount)
#
# CHÚ Ý: Chỉ tham chiếu các service ĐANG THỰC SỰ CHẠY trong cluster:
# cart, customer, inventory, media, order, product, search, tax,
# storefront-bff, backoffice-bff, storefront-ui, backoffice-ui, swagger
# ==============================================================

# product: chỉ nhận từ storefront-bff, backoffice-bff, order, cart, inventory
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-product
  namespace: yas-app
spec:
  action: ALLOW
  selector:
    matchLabels:
      app: product
  rules:
    - from:
        - source:
            namespaces: ["yas-app"]
            principals:
              - "cluster.local/ns/yas-app/sa/storefront-bff"
              - "cluster.local/ns/yas-app/sa/backoffice-bff"
              - "cluster.local/ns/yas-app/sa/order"
              - "cluster.local/ns/yas-app/sa/cart"
              - "cluster.local/ns/yas-app/sa/inventory"
---
# cart: chỉ nhận từ storefront-bff và order
