# ==============================================================
# Retry Policies - VirtualService cho các backend services
#
# Cấu hình:
# - timeout: 30s   (timeout TỔNG THỂ cho cả request, kể cả retry)
# - attempts: 3    (số lần retry tối đa)
# - perTryTimeout: 10s (timeout mỗi lần thử: 3 x 10s = 30s)
# - retryOn: 5xx,gateway-error,connect-failure
# ==============================================================
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: product-vs
  namespace: yas-app
spec:
  hosts:
    - product
  http:
    - timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: 5xx,gateway-error,connect-failure,retriable-4xx
      route:
        - destination:
            host: product
            port:
              number: 80
---
