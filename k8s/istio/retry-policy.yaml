# ==============================================================
# Retry Policies - VirtualService cho các backend services
# Retry 3 lần khi gặp lỗi 5xx, timeout 10s
# ==============================================================
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: product-vs
  namespace: yas-app
spec:
  hosts:
    - product
  http:
    - retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: 5xx,gateway-error,connect-failure
      route:
        - destination:
            host: product
            port:
              number: 80
---
