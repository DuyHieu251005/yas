# Retry Policy cho product service (ví dụ minh hoạ retry khi gặp lỗi 5xx)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: product-retry-policy
  namespace: yas-app
spec:
  hosts:
    - product
  http:
    - timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "5xx,reset,connect-failure,retriable-4xx"
      route:
        - destination:
            host: product
            port:
              number: 80
---
