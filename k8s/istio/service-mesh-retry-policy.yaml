# ============================================================
# YAS Service Mesh – Retry Policy (VirtualService)
# Namespace: yas-app
# Retry: 3 attempts, 10s per try, on 5xx/gateway-error
# ============================================================

---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: search-vs
  namespace: yas-app
spec:
  hosts:
  - search
  http:
  - retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,gateway-error,connect-failure,retriable-4xx
    timeout: 30s
    route:
    - destination:
        host: search
        port:
          number: 80

